name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default: deny all GITHUB_TOKEN permissions; jobs opt in explicitly.
permissions: {}

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Harden runner (egress allowlist + audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync deps
        run: uv sync --all-extras
      - name: Lint (no live-trading imports)
        run: |
          ! grep -r "from alpaca.trading" backend/app || (echo "FAIL: alpaca.trading imported"; exit 1)
          ! grep -r "TradingClient" backend/app || (echo "FAIL: TradingClient referenced"; exit 1)
      - name: Ruff
        run: uv run ruff check backend
      - name: Mypy
        run: uv run mypy backend/app || true
      - name: Pytest
        env:
          XAI_API_KEY: test-xai
          ALPACA_API_KEY: test-alpaca
          ALPACA_SECRET_KEY: test-alpaca-secret
          DATA_DIR: /tmp/grok-alpaca-ci
        run: uv run pytest backend/tests -v --maxfail=3

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - name: Harden runner (egress allowlist + audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install (npm ci — lockfile-only, scripts blocked by .npmrc)
        run: npm ci
        working-directory: frontend
      - name: Run allowlisted lifecycle scripts only
        run: npx allow-scripts
        working-directory: frontend
      - name: Audit (fail on high+)
        run: npm audit --audit-level=high
        working-directory: frontend
      - name: Verify package provenance signatures
        run: npm audit signatures
        working-directory: frontend
        continue-on-error: true
      - run: npm run lint || true
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner (egress allowlist + audit)
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install (npm ci — lockfile-only, scripts blocked by .npmrc)
        run: npm ci
        working-directory: frontend
      - name: Run allowlisted lifecycle scripts only
        run: npx allow-scripts
        working-directory: frontend
      - name: Audit (fail on high+)
        run: npm audit --audit-level=high
        working-directory: frontend
      - name: Verify package provenance signatures
        run: npm audit signatures
        working-directory: frontend
        continue-on-error: true
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Run Playwright tests
        run: npx playwright test
        working-directory: frontend
        env:
          CI: "true"
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
