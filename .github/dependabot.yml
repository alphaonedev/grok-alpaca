version: 2
updates:
  # GitHub Actions versions — supply chain matters here too.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - security
      - ci
    groups:
      actions:
        patterns:
          - "*"

  # npm (frontend) — security updates only by default. Normal version bumps
  # use a separate cadence to limit churn during supply-chain crises.
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - security
      - npm
    # Only open PRs for security advisories. Routine version bumps are
    # opt-in via `groups` below.
    versioning-strategy: increase-if-necessary
    groups:
      patch-updates:
        update-types:
          - patch
        patterns:
          - "*"
      minor-updates:
        update-types:
          - minor
        patterns:
          - "*"
    ignore:
      # Vite v6+ requires Node 22+ and breaks our current toolchain. Track
      # manually until the next planned major bump.
      - dependency-name: vite
        update-types:
          - version-update:semver-major

  # pip (backend) — same treatment.
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - security
      - python
    groups:
      patch-updates:
        update-types:
          - patch
        patterns:
          - "*"
      minor-updates:
        update-types:
          - minor
        patterns:
          - "*"
